# arm_moveit_config/config/trajectory_execution.yaml
# ============================================================
# Settings controlling how MoveIt2 executes planned trajectories.
# ============================================================

# Allow trajectory execution (set false to plan-only mode)
moveit_manage_controllers: true

# Maximum allowed execution duration scaling factor
# If trajectory takes longer than planned_time × factor, abort
trajectory_execution:
  allowed_execution_duration_scaling: 3.0
  allowed_goal_duration_margin: 10.0
  allowed_start_tolerance: 0.0

# Execution monitoring
execution_duration_monitoring: true

# Wait for trajectory execution completion
wait_for_trajectory_completion: true
