# arm_gazebo/config/ros2_controllers.yaml
# ============================================================
# ros2_control controller configuration loaded by Gazebo plugin.
# Defines all controllers:
#   - joint_state_broadcaster: publishes /joint_states
#   - arm_controller: joint trajectory controller for 6 arm joints
#   - gripper_controller: position controller for gripper fingers
#
# Physics-stable configuration:
#   - Low update_rate (10 Hz) to prevent numerical instability
#   - No aggressive PID gains — relies on URDF damping/friction
#   - All tolerances disabled for gravity-drift tolerance
# ============================================================

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    # ── Controllers to load ──────────────────────────────────────────
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/JointGroupPositionController

# ── Joint State Broadcaster ────────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - left_finger_joint
      - right_finger_joint
    interface_names:
      - position
      - velocity
      - effort

# ── Arm Trajectory Controller ─────────────────────────────────────────
arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6

    # Command interface type (position, velocity, or effort)
    command_interfaces:
      - position

    # State interfaces to read back from hardware
    state_interfaces:
      - position
      - velocity


    # Action server settings
    state_publish_rate: 25.0
    action_monitor_rate: 10.0    # Hz — how often to check execution status
    allow_partial_joints_goal: false

    # Trajectory interpolation settings
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    # Trajectory constraints (per-joint tolerances)
    # NOTE: Setting tolerance to 0.0 = DISABLED (do not enforce).
    # The arm spawns at all-zeros and drifts under gravity before the
    # controller sends the first trajectory. With state tolerance enabled,
    # trajectories are rejected because the current pos is far from the
    # trajectory start. Disabling lets the PID handle any starting position.
    constraints:
      stopped_velocity_tolerance: 0.02
      goal_time: 2.0
      joint1:
        trajectory: 0.0
        goal: 0.0
      joint2:
        trajectory: 0.0
        goal: 0.0
      joint3:
        trajectory: 0.0
        goal: 0.0
      joint4:
        trajectory: 0.0
        goal: 0.0
      joint5:
        trajectory: 0.0
        goal: 0.0
      joint6:
        trajectory: 0.0
        goal: 0.0


# ── Gripper Position Controller ────────────────────────────────────────
# CRITICAL: Reduced gains for extreme ODE solver stability.
# The I term safely resolves steady-state holding pressure.
gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity



# ── Gazebo Internal PID Control ────────────────────────────────────────
# CRITICAL: Since hardware interfaces use "position" commands, Gazebo defaults
# to SetPosition (teleportation), which breaks rigid physics constraints.
# Defining pid_gains here instructs the gazebo_ros2_control plugin to use
# internal PID loops (SetForce), which perfectly stabilizes the ODE solver
# and prevents the links from ripping apart or floating.
gazebo_ros2_control:
  ros__parameters:
    pid_gains:
      position:
        # Arm joints: boosted gains to resist gravity during slow approach
        joint1: {kp: 400.0, ki: 5.0,  kd: 40.0}
        joint2: {kp: 600.0, ki: 10.0, kd: 60.0}
        joint3: {kp: 400.0, ki: 5.0,  kd: 40.0}
        joint4: {kp: 200.0, ki: 2.0,  kd: 20.0}
        joint5: {kp: 150.0, ki: 2.0,  kd: 15.0}
        joint6: {kp: 100.0, ki: 1.0,  kd: 10.0}
        # Gripper: high kp + ki to maintain grip force against cube contact
        # ki ensures steady-state error is eliminated (fingers stay closed)
        left_finger_joint:  {kp: 500.0, ki: 50.0, kd: 10.0}
        right_finger_joint: {kp: 500.0, ki: 50.0, kd: 10.0}
